<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie rental - Reset Password</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #d4d2d2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
        }

        .container {
            text-align: center;
            margin-top: 80px;
        }

        h1 {
            color: #ffffff;
            font-style: italic;
            margin-bottom: 30px;
        }

        .card {
            background: #efefef;    
            padding: 25px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;    
            width: 400px;
            margin: 0 auto;
            align-items: center;  
            gap: 15px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 16px;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: none;
            background: #cfcfcf;
            border-radius: 5px;
        }

        button {
            height: 50px;
            width: 150px;
            margin-top: 15px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            border: solid #404c5d 1px;
            font-size: 16px;
            color: rgb(161, 161, 161);
            border-radius: 5px;
            background: linear-gradient(145deg, #2e2d2d, #212121);
            box-shadow: -1px -2px 6px #41465b, 2px 2px 6px #41465b,
                inset 2px 2px 5px #212121, inset -2px -2px 5px #212121;
            transition: 300ms;
        }

        button:hover {
            box-shadow: 1px 1px 13px #20232e, -1px -1px 13px #545b78;
            color: #d6d6d6;
        }

        footer {
            background-color: #3a3a3a;
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 15px;
            font-size: 12px;
        }

        nav {
            background-color: #3a3a3a;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            padding: 14px 24px;
            width: 400px;
            margin: 0 auto 20px;
            box-sizing: border-box;
        }

        nav a {
            color: #ccc;
            text-decoration: none;
        }

        nav a.active { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Movie rental</h1>

    <nav>
        <a href="/home">Home</a>
        <a href="/login" class="active">Reset Password</a>
    </nav>

    <div class="card">
        <form method="post" action="/help/passwordreset">
            <input type="hidden" name="token" value="{{ token }}">

            <label>New Password:</label>
            <input type="password" name="new_password" required>

            <button type="submit">Update</button>
        </form>

        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}
    </div>
</div>

<footer>
    <div>Made by: Edgars Sniedze</div>
    <div>2026</div>
</footer>

</body>
</html>
