<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie rental - Home</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #d4d2d2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
        }

        .container {
            text-align: center;
            margin-top: 80px;
        }

        h1 {
            color: #ffffff;
            font-style: italic;
            margin-bottom: 30px;
        }

        .card {
            background: #efefef;
            padding: 25px;
            border-radius: 20px;
            display: inline-block;
            width: 550px;
        }

        .btn {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 20px;
            background-color: #3a3a3a;
            color: white;
            cursor: pointer;
        }

        footer {
            background-color: #3a3a3a;
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 15px;
            font-size: 12px;
        }

        nav {
            background-color: #3a3a3a;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            padding: 14px 24px;
            width: 550px;
            margin: 0 auto 20px;
            box-sizing: border-box;
        }

        nav a {
            color: #ccc;
            text-decoration: none;
            font-size: 1rem;
        }

        nav a.active { color: #fff; font-weight: bold; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }

        th { text-align: left; font-size: 0.85rem; color: #555; padding: 0 10px 4px; }

        td { background: #cfcfcf; padding: 10px; }
        td:first-child { border-radius: 10px 0 0 10px; }
        td:last-child  { border-radius: 0 10px 10px 0; text-align: center; }

        .btn-rent {
            background: #3a3a3a;
            color: #fff;
            border: none;
            padding: 7px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Movie rental</h1>
    <nav>
        <a href="/home" class="active">Home</a>
        <a href="/yourmovies">Your movies</a>
        <a href="/profile">Profile</a>
        
    </nav>

    <div class="card">
        <p><strong>Available Movies</strong></p>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Description</th>
                    <th>In Stock</th>
                    <th>Rent</th>
                </tr>
            </thead>
            <tbody>
                {% for movie in movies.data %}
                <tr>
                    <td>{{ movie.title }}</td>
                    <td>{{ movie.price }}€</td>
                    <td>{{ movie.description }}</td>
                    <td>Yes</td>
                    <td>        
                        <form method="POST" action="/api/rent/{{ movie.id }}">
                            <button class="btn-rent" type="submit">Rent</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<footer>
    <div>Made by: Edgars Sniedze</div>
    <div>2026</div>
</footer>

</body>
</html>
